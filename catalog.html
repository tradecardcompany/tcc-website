<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Catálogo | Trade Card Company</title>
  <meta name="description" content="Catálogo TCC: Sellado, Singles y Accesorios. Compra por WhatsApp." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-glow"></div>

  <header class="container header">
    <div class="brand">
      <div class="logo-dot"></div>
      <div>
        <div class="brand-name">Trade Card Company</div>
        <div class="brand-tag">Catálogo • WhatsApp</div>
      </div>
    </div>

    <nav class="nav">
      <a href="index.html">Inicio</a>
      <a href="#sellado">Sellado</a>
      <a href="#singles">Singles</a>
      <a href="#accesorios">Accesorios</a>
      <a class="pill" target="_blank" rel="noopener"
         href="https://wa.me/50767131015?text=Hola%20TCC%20👋%20Quiero%20hacer%20un%20pedido.">
        WhatsApp
      </a>
    </nav>
  </header>

  <main class="container">
    <section class="catalog-top">
      <h1>Catálogo</h1>
      <p class="subtitle">
        Toca “Pedir” y se abre WhatsApp con el mensaje listo. Stock real (si algo se agota, te lo decimos de una).
      </p>

      <div class="filters">
        <input id="search" class="input" placeholder="Buscar (ej: ETB, toploader, Charizard…)" />
        <select id="category" class="select">
          <option value="all">Todas</option>
          <option value="Sellado">Sellado</option>
          <option value="Singles">Singles</option>
          <option value="Accesorios">Accesorios</option>
        </select>
      </div>
    </section>

    <section id="sellado" class="section-title">🔥 Sellado</section>
    <div id="grid-sellado" class="product-grid"></div>

    <section id="singles" class="section-title">💎 Singles</section>
    <div id="grid-singles" class="product-grid"></div>

    <section id="accesorios" class="section-title">🛡 Accesorios</section>
    <div id="grid-accesorios" class="product-grid"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
